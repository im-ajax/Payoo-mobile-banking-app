<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- tailwind+daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Payoo | Login</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <!-- google font :outfit -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">  
    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css" integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        *{
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <div class="left flex gap-1">
                <div class="logo w-[60px]">
                    <img src="./assets/logo.png" alt="">
                </div>
                <div class="balance-info">
                    <h2 class="text-2xl font-bold">$ <span id="balance">45000</span></h2>
                    <p class="text-neutral/40">Available Balance</p>
                </div>
            </div>
            <div class="right">
                <a href="/index.html" class="btn"><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
            </div>
        </section>
    </header>

    <section class="w-11/12 mx-auto py-10 space-y-5">
        <h2 class="text-3xl font-bold">Welcome to Pay<span class="text-primary">oo</span>
        </h2>
        <p class="text-neutral/40">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>
        <div class="buttons grid grid-cols-3 gap-3">
            <button class="btn flex-col h-full py-2.5 btn-soft">
                <img src="./assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>
            <button class="btn flex-col h-full py-2.5 btn-soft">
                <img src="./assets/opt-2.png" alt="">
                <p>Cash Out</p>
            </button>
            <button class="btn flex-col h-full py-2.5 btn-soft">
                <img src="./assets/opt-3.png" alt="">
                <p>Send Money</p>
            </button>
            <button class="btn flex-col h-full py-2.5 btn-soft">
                <img src="./assets/opt-4.png" alt="">
                <p>Get Bonus</p>
            </button>
            <button class="btn flex-col h-full py-2.5 btn-soft">
                <img src="./assets/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>
            <button class="btn flex-col h-full py-2.5 btn-soft">
                <img src="./assets/opt-6.png" alt="">
                <p>Transaction</p>
            </button>
        </div>
    </section>
    <section id="cashout" class="w-11/12 mx-auto py-5">
        <h2 class="text-2xl font-bold mb-5">Cashout</h2>
        <div class="form pt-10">
            <div class="card bg-base-100 w-full shadow rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">

                        <label class="label text-neutral font-bold">Agent Number</label>
                        <input id="cashout-number" maxlength="11" minlength="11" type="Mobile Number" class="input rounded-full w-full" placeholder="Enter agent 11 digit Number" />
                        <br>

                        <label class="label text-neutral font-bold">Amount</label>
                        <input id="cashout-amount" maxlength="4" type="number" class="input rounded-full w-full" placeholder="Enter amount for withdraw" />
                        <br>

                        <label class="label text-neutral font-bold">4 digit Pin</label>
                        <input id="cashout-pin" maxlength="4" type="password" class="input rounded-full w-full" placeholder="Enter 4 digit pin" />
                        <br>

                        <button id="cashout-btn" class="btn btn-primary mt-4 rounded-full">Withdraw money</button>
                    </fieldset>
                </div>
            </div>
            </div>
    </section>
    <script src="./script/cashout.js"></script>
    <script src="./script/machine.js"></script>
</body>
</html>
